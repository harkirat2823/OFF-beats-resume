<!-- <!-- <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Offbeats — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Clash+Display:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070709;
  --or:#ff6a1a;--or2:#ff9a4a;--or3:#ffba70;
  --neon-or:rgba(255,106,26,1);
  --glow-sm:0 0 12px rgba(255,106,26,.6);
  --glow-md:0 0 30px rgba(255,106,26,.5),0 0 60px rgba(255,106,26,.2);
  --glow-lg:0 0 50px rgba(255,106,26,.7),0 0 100px rgba(255,106,26,.3),0 0 200px rgba(255,106,26,.1);
  --glass:rgba(255,255,255,.04);
  --glass-border:rgba(255,255,255,.08);
  --glass-border-or:rgba(255,106,26,.35);
  --wh:#f5f0eb;--mu:#666;
  --fd:'Clash Display',sans-serif;
  --fb:'Outfit',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--wh);font-family:var(--fb);overflow-x:hidden;cursor:none}


#vol-bg{position:fixed;inset:0;z-index:0;pointer-events:none}


body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:9990}

nav{position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:500;width:calc(100% - 3rem);max-width:1200px;margin-top:1rem;display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.8rem;background:rgba(10,9,12,.7);backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--glass-border);border-radius:100px}
.nlogo{font-family:var(--fm);font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:var(--wh);text-decoration:none;display:flex;align-items:center;gap:.5rem}
.nlogo-dot{width:8px;height:8px;background:var(--or);border-radius:50%;box-shadow:var(--glow-sm);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.nlinks{display:flex;gap:2rem;list-style:none}
.nlinks a{font-family:var(--fb);font-size:.82rem;font-weight:500;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s}
.nlinks a:hover{color:var(--wh)}
.ncta{font-family:var(--fb);font-size:.82rem;font-weight:600;color:var(--bg);background:var(--or);padding:.5rem 1.4rem;border-radius:100px;text-decoration:none;transition:box-shadow .25s,transform .2s;box-shadow:0 0 20px rgba(255,106,26,.4)}
.ncta:hover{box-shadow:var(--glow-md);transform:translateY(-1px)}

.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:2;text-align:center;padding:0 2rem;overflow:hidden}


.hero-pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,106,26,.12);border:1px solid rgba(255,106,26,.3);border-radius:100px;padding:.35rem .9rem .35rem .45rem;font-family:var(--fm);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:2.5rem;opacity:0;animation:fadeUp .8s .2s forwards}
.hero-pill-tag{background:var(--or);color:#000;border-radius:100px;padding:.18rem .65rem;font-weight:700;font-size:.62rem;letter-spacing:.08em}


.hero-name{font-family:var(--fd);font-size:clamp(4.5rem,13vw,11rem);font-weight:700;line-height:.95;letter-spacing:-.01em;position:relative;opacity:0;animation:fadeUp .9s .35s forwards;perspective:800px;margin-bottom:.5rem}
.name-3d{display:inline-block;background:linear-gradient(180deg,#fff 0%,var(--or2) 60%,var(--or) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:name3d 6s ease-in-out infinite;transform-style:preserve-3d;text-shadow:none;filter:drop-shadow(0 0 40px rgba(255,106,26,.5))}
@keyframes name3d{
  0%,100%{transform:rotateY(0deg) rotateX(2deg);filter:drop-shadow(0 0 40px rgba(255,106,26,.5))}
  25%{transform:rotateY(-4deg) rotateX(-1deg);filter:drop-shadow(4px 0 50px rgba(255,106,26,.7))}
  75%{transform:rotateY(4deg) rotateX(1deg);filter:drop-shadow(-4px 0 50px rgba(255,150,60,.7))}
}

.name-outline{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:clamp(4.5rem,13vw,11rem);font-weight:700;line-height:.95;-webkit-text-fill-color:transparent;-webkit-text-stroke:1px rgba(255,106,26,.25);pointer-events:none;animation:name3d 6s ease-in-out infinite .15s;filter:blur(1px)}

.hero-role{font-family:var(--fb);font-size:clamp(1rem,2.2vw,1.35rem);font-weight:300;color:rgba(255,255,255,.5);letter-spacing:.35em;text-transform:uppercase;opacity:0;animation:fadeUp .8s .55s forwards;margin-bottom:3rem}
.hero-role span{color:var(--or);font-weight:500}

.hero-desc{font-size:1rem;color:rgba(255,255,255,.4);max-width:520px;line-height:1.8;opacity:0;animation:fadeUp .8s .7s forwards;margin-bottom:3rem}
.hero-desc strong{color:rgba(255,255,255,.75);font-weight:500}

.hero-btns{display:flex;gap:1rem;justify-content:center;opacity:0;animation:fadeUp .8s .85s forwards}
.btn-prim{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--fb);font-size:.88rem;font-weight:600;background:var(--or);color:#000;padding:.75rem 2rem;border-radius:100px;text-decoration:none;transition:box-shadow .25s,transform .2s;box-shadow:0 0 25px rgba(255,106,26,.45);border:none;cursor:none}
.btn-prim:hover{box-shadow:var(--glow-md);transform:translateY(-2px)}
.btn-sec{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--fb);font-size:.88rem;font-weight:500;background:var(--glass);color:rgba(255,255,255,.7);padding:.75rem 2rem;border-radius:100px;text-decoration:none;border:1px solid var(--glass-border);backdrop-filter:blur(12px);transition:border-color .2s,color .2s;cursor:none}
.btn-sec:hover{border-color:rgba(255,106,26,.5);color:var(--wh)}

.laser{position:absolute;height:1px;pointer-events:none;z-index:1}
.laser-h{width:60%;left:20%;background:linear-gradient(90deg,transparent,var(--or),transparent);animation:laser-h-anim 4s ease-in-out infinite;opacity:.4}
.laser-v{width:1px;height:50%;top:25%;background:linear-gradient(180deg,transparent,var(--or),transparent);animation:laser-v-anim 5s ease-in-out infinite;opacity:.3}
.laser1{top:30%}
.laser2{top:60%;animation-delay:2s}
.lv1{left:25%}
.lv2{right:25%;animation-delay:1.5s}
@keyframes laser-h-anim{0%,100%{opacity:.15;width:40%}50%{opacity:.5;width:70%}}
@keyframes laser-v-anim{0%,100%{opacity:.1;height:35%}50%{opacity:.4;height:65%}}


.scroll-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0;animation:fadeUp .8s 1.2s forwards}
.scroll-hint span{font-family:var(--fm);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.scroll-line{width:1px;height:40px;background:linear-gradient(var(--or),transparent);animation:sla 2s ease-in-out infinite}
@keyframes sla{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}50.01%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}

@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}


.sec{padding:8rem 2rem;position:relative;z-index:2;max-width:1200px;margin:0 auto}
.sec-full{padding:8rem 0;position:relative;z-index:2}
.sec-full .inner{max-width:1200px;margin:0 auto;padding:0 2rem}
.stag{font-family:var(--fm);font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--or);display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.stag::before{content:'';width:20px;height:1px;background:var(--or);box-shadow:var(--glow-sm)}
.stitle{font-family:var(--fd);font-size:clamp(2.8rem,6vw,5.5rem);font-weight:700;line-height:1;letter-spacing:-.01em;margin-bottom:4rem}
.stitle .glow-txt{background:linear-gradient(135deg,#fff 0%,var(--or2) 50%,var(--or) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(255,106,26,.4))}


.div-glow{height:1px;background:linear-gradient(90deg,transparent,rgba(255,106,26,.4),transparent);position:relative;z-index:2}

.about-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:5rem;align-items:center}

.glass-card{background:var(--glass);backdrop-filter:blur(20px) saturate(150%);border:1px solid var(--glass-border);border-radius:20px;padding:2.5rem;transition:border-color .3s,box-shadow .3s}
.glass-card:hover{border-color:var(--glass-border-or);box-shadow:0 0 40px rgba(255,106,26,.08)}
.about-img{aspect-ratio:4/5;background:radial-gradient(ellipse at 50% 80%,rgba(255,106,26,.2) 0%,rgba(255,106,26,.05) 40%,transparent 70%);border-radius:16px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:1px solid rgba(255,106,26,.2)}
.about-letter{font-family:var(--fd);font-size:16rem;font-weight:700;background:linear-gradient(180deg,rgba(255,106,26,.25),rgba(255,106,26,.05));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;user-select:none;animation:float 5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.about-badge-wrap{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);white-space:nowrap}
.about-badge{background:rgba(255,106,26,.15);backdrop-filter:blur(12px);border:1px solid rgba(255,106,26,.4);border-radius:100px;padding:.4rem 1rem;font-family:var(--fm);font-size:.62rem;letter-spacing:.1em;color:var(--or);text-transform:uppercase;box-shadow:0 0 20px rgba(255,106,26,.2)}

.about-img::after{content:'';position:absolute;inset:-1px;border-radius:17px;background:linear-gradient(180deg,transparent 0%,rgba(255,106,26,.25) 100%);pointer-events:none}

.about-text p{font-size:1rem;line-height:1.85;color:rgba(255,255,255,.55);margin-bottom:1.3rem}
.about-text strong{color:var(--wh);font-weight:600}
.about-text .hl{color:var(--or2)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:2.5rem;padding-top:2rem;border-top:1px solid var(--glass-border)}
.info-item .il{font-family:var(--fm);font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--mu);margin-bottom:.3rem}
.info-item .iv{font-size:.95rem;font-weight:600;color:var(--wh)}
.info-item .iv.active{color:var(--or)}


.skills-bg{background:linear-gradient(180deg,var(--bg) 0%,rgba(15,8,0,.95) 50%,var(--bg) 100%)}
.skgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem}
.sk-card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:16px;padding:2rem;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s,transform .3s;cursor:none}
.sk-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);transform:scaleX(0);transform-origin:center;transition:transform .4s}
.sk-card:hover{border-color:rgba(255,106,26,.3);box-shadow:0 0 40px rgba(255,106,26,.1),inset 0 0 40px rgba(255,106,26,.03);transform:translateY(-4px)}
.sk-card:hover::before{transform:scaleX(1)}

.sk-card::after{content:'';position:absolute;top:0;left:0;width:60px;height:60px;background:radial-gradient(circle at 0 0,rgba(255,106,26,.15),transparent 70%);pointer-events:none}
.sk-ico{width:44px;height:44px;background:rgba(255,106,26,.1);border:1px solid rgba(255,106,26,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:1.4rem;transition:box-shadow .3s}
.sk-card:hover .sk-ico{box-shadow:0 0 20px rgba(255,106,26,.3)}
.sk-ico svg{width:20px;height:20px;stroke:var(--or);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.sk-name{font-family:var(--fd);font-size:1.5rem;font-weight:600;margin-bottom:1rem;letter-spacing:.01em}
.sk-tags{display:flex;flex-wrap:wrap;gap:.4rem}
.tag{font-family:var(--fm);font-size:.6rem;letter-spacing:.06em;padding:.25rem .65rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.5);border-radius:100px;text-transform:uppercase;transition:all .2s}
.tag.on{background:rgba(255,106,26,.12);border-color:rgba(255,106,26,.35);color:var(--or2)}
.sk-card:hover .tag{border-color:rgba(255,106,26,.2);color:rgba(255,255,255,.6)}
.sk-card:hover .tag.on{border-color:rgba(255,106,26,.5);color:var(--or)}
.pgrid{display:grid;gap:1.5rem}
.pcard{display:grid;grid-template-columns:1fr 1.2fr;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:20px;overflow:hidden;transition:border-color .35s,box-shadow .35s,transform .35s;cursor:none}
.pcard:hover{border-color:rgba(255,106,26,.4);box-shadow:0 8px 60px rgba(255,106,26,.15);transform:translateY(-4px)}
.pcard:nth-child(even){direction:rtl}.pcard:nth-child(even)>*{direction:ltr}
.pvis{position:relative;min-height:260px;overflow:hidden}
.pvi{width:100%;height:100%;min-height:260px;display:flex;align-items:center;justify-content:center;position:relative}
.pv1{background:radial-gradient(ellipse at 50% 100%,rgba(255,90,20,.3) 0%,rgba(15,6,0,.9) 60%)}
.pv2{background:radial-gradient(ellipse at 50% 100%,rgba(255,130,0,.25) 0%,rgba(0,8,20,.9) 60%)}
.pv3{background:radial-gradient(ellipse at 50% 100%,rgba(255,60,100,.2) 0%,rgba(10,0,20,.9) 60%)}
.pv4{background:radial-gradient(ellipse at 50% 100%,rgba(0,200,150,.2) 0%,rgba(0,12,10,.9) 60%)}
.pv-grid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,rgba(255,106,26,.04) 0,rgba(255,106,26,.04) 1px,transparent 1px,transparent 40px),repeating-linear-gradient(90deg,rgba(255,106,26,.04) 0,rgba(255,106,26,.04) 1px,transparent 1px,transparent 40px)}
.pv-ico{position:relative;z-index:1}
.pv-ico svg{width:52px;height:52px;stroke:rgba(255,106,26,.7);fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 16px rgba(255,106,26,.6));transition:filter .3s,stroke .3s}
.pcard:hover .pv-ico svg{stroke:var(--or2);filter:drop-shadow(0 0 28px rgba(255,150,60,.9))}
.pv-glow{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--or),transparent);opacity:0;transition:opacity .3s}
.pcard:hover .pv-glow{opacity:1}
.pv-num{position:absolute;bottom:0;right:1rem;font-family:var(--fd);font-size:8rem;font-weight:700;color:rgba(255,106,26,.07);line-height:1;transition:color .3s}
.pcard:hover .pv-num{color:rgba(255,106,26,.14)}

.pinfo{padding:2.5rem;display:flex;flex-direction:column;justify-content:center}
.pnum{font-family:var(--fm);font-size:.6rem;letter-spacing:.2em;color:var(--or);margin-bottom:.75rem;opacity:.8}
.ptit{font-family:var(--fd);font-size:1.9rem;font-weight:600;letter-spacing:.01em;margin-bottom:.9rem;line-height:1.1}
.pdesc{font-size:.88rem;line-height:1.75;color:rgba(255,255,255,.45);margin-bottom:1.3rem}
.ptags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.5rem}
.plink{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--fm);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--or);text-decoration:none;transition:gap .2s,text-shadow .2s;width:fit-content}
.plink:hover{gap:1rem;text-shadow:var(--glow-sm)}
.plink svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.contact-wrap{position:relative}
.contact-glow-orb{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(255,106,26,.12) 0%,transparent 65%);top:-200px;left:-200px;pointer-events:none;animation:orb-p 8s ease-in-out infinite}
@keyframes orb-p{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.6}}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start}
.chd{font-family:var(--fd);font-size:clamp(2.5rem,5vw,4rem);font-weight:700;line-height:1.05;margin-bottom:1.5rem;letter-spacing:-.01em}
.chd span{background:linear-gradient(135deg,var(--or2),var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 15px rgba(255,106,26,.4))}
.cp{font-size:.98rem;line-height:1.8;color:rgba(255,255,255,.45);margin-bottom:2rem}
.socs{display:flex;flex-wrap:wrap;gap:.7rem}
.sl{display:flex;align-items:center;gap:.5rem;font-family:var(--fm);font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,.45);background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-border);border-radius:100px;padding:.5rem 1rem;text-decoration:none;transition:border-color .2s,color .2s,box-shadow .2s;cursor:none}
.sl:hover{border-color:rgba(255,106,26,.45);color:var(--or);box-shadow:0 0 16px rgba(255,106,26,.15)}
.sl svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.cform{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:20px;padding:2.5rem}
.fg{margin-bottom:1.3rem}
.fl{font-family:var(--fm);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.35);display:block;margin-bottom:.4rem}
.fi,.ft{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;color:var(--wh);font-family:var(--fb);font-size:.92rem;padding:.8rem 1rem;outline:none;transition:border-color .2s,box-shadow .2s;resize:none}
.fi:focus,.ft:focus{border-color:rgba(255,106,26,.5);box-shadow:0 0 0 3px rgba(255,106,26,.08)}
.ft{height:110px}
.fi::placeholder,.ft::placeholder{color:rgba(255,255,255,.2)}


footer{padding:2rem 2rem;border-top:1px solid rgba(255,255,255,.06);position:relative;z-index:2;max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.flogo{font-family:var(--fm);font-size:.8rem;letter-spacing:.12em;text-transform:uppercase}
.flogo span{color:var(--or)}
.fcp{font-family:var(--fm);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.25)}
.fbk{font-family:var(--fm);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:color .2s;cursor:none}
.fbk:hover{color:var(--or)}
.fbk svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}



.sr{opacity:0;transform:translateY(40px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
.sr.from-left{transform:translateX(-40px)}
.sr.from-right{transform:translateX(40px)}
.sr.v{opacity:1;transform:translate(0)}

.stats-row{display:flex;gap:3rem;justify-content:center;flex-wrap:wrap;margin:5rem 0 0}
.stat-glass{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:16px;padding:1.5rem 2.5rem;text-align:center;transition:border-color .3s,box-shadow .3s}
.stat-glass:hover{border-color:rgba(255,106,26,.3);box-shadow:0 0 30px rgba(255,106,26,.1)}
.stat-n{font-family:var(--fd);font-size:3rem;font-weight:700;background:linear-gradient(180deg,#fff,var(--or));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 10px rgba(255,106,26,.4));line-height:1}
.stat-l{font-family:var(--fm);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:.4rem}

@media(max-width:900px){
  nav{padding:.75rem 1.2rem}.nlinks{display:none}
  .about-grid,.cgrid{grid-template-columns:1fr;gap:2.5rem}
  .skgrid{grid-template-columns:1fr}
  .pcard{grid-template-columns:1fr}.pcard:nth-child(even){direction:ltr}
  .pvis{min-height:180px}
  .stats-row{gap:1rem}
  footer{flex-direction:column;gap:.8rem;text-align:center}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="ring"></div>

const COLS=18;

    colData.push({
      x:i*step+step/2,
      baseH:VH*(0.35+Math.random()*.5),
      phase:Math.random()*Math.PI*2,

}

let vt=0;

let mouseInfluence={x:VW/2,y:VH/2};
document.addEventListener('mousemove',e=>{mouseInfluence.x=e.clientX;mouseInfluence.y=e.clientY});

function drawVol(){

  vt+=.012;

  colData.forEach((col,i)=>{
    const wave=Math.sin(vt*col.speed*80+col.phase);
